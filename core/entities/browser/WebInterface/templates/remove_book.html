{% extends 'base.html' %}

{% block content %}
<h1>Remove Books</h1>
{% with messages = get_flashed_messages() %}
{% if messages %}
<ul class="flashes">
    {% for message in messages %}
    <li>{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}
{% endwith %}

<h2>Input book name to delete</h2>

<form method="post">
    <label for="title">Book title</label><br>
    <input type="text" id="title" name="title"><br>
    <input type="submit" value="Submit">
</form>

{% endblock %}
